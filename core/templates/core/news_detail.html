

{% extends "core/base.html" %}
{% block title %}{{ article.title }}{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-container-padding py-stack-lg">

    <a href="{% url 'core:news_list' %}" class="inline-flex items-center gap-2 text-on-surface-variant text-sm mb-6 hover:text-primary transition-colors">
        <span class="material-symbols-outlined text-sm">arrow_back</span>
        Back to News
    </a>

    <span class="text-[10px] font-bold text-primary tracking-widest uppercase">News</span>
    <h1 class="font-display-lg text-headline-md mt-2 mb-2">{{ article.title }}</h1>
    <p class="text-on-surface-variant text-sm mb-6">{{ article.created_at|date:"F d, Y" }}</p>

    {% if article.image %}
    <img src="{{ article.image.url }}" alt="{{ article.title }}" class="w-full rounded-xl mb-6">
    {% endif %}

    <div class="glass-panel p-6 md:p-8 rounded-xl">
        <div class="prose-content text-on-surface leading-relaxed">{{ article.content|linebreaks }}</div>
    </div>
</div>
{% endblock %}
