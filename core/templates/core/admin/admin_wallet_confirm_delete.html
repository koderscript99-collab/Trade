
{% extends "core/admin/admin_base.html" %}
{% block title %}Delete Wallet{% endblock %}
{% block content %}
<h1>Delete Wallet: {{ object.coin }}</h1>
<p>Are you sure you want to delete this wallet?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Confirm Delete</button>
</form>
<a href="{% url 'core:admin_wallets_list' %}">Cancel</a>
{% endblock %}
