

{% extends "core/admin/admin_base.html" %}
{% block title %}Wallet Form{% endblock %}
{% block content %}
<h1>{% if object %}Edit Wallet{% else %}New Wallet{% endif %}</h1>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save</button>
</form>
<a href="{% url 'core:admin_wallets_list' %}">Back to Wallets</a>
{% endblock %}
