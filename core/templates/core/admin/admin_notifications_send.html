{% extends "core/admin/admin_base.html" %}
{% block title %}Send Notification{% endblock %}
{% block page_title %}Send Notification{% endblock %}
{% block content %}

<div class="max-w-2xl mx-auto flex flex-col gap-6">

  <div>
    <h1 class="text-2xl font-bold text-on-surface tracking-tight flex items-center gap-2">
      <span class="material-symbols-outlined text-primary">notifications</span>Send Notification
    </h1>
    <p class="text-sm text-on-surface-variant mt-1">Broadcast a message to users on the platform.</p>
  </div>

  <div class="glass-panel rounded-xl p-6">
    <form method="post" class="space-y-4">
      {% csrf_token %}
      <div class="[&_select]:bg-surface-container-high [&_select]:border-outline-variant [&_select]:text-on-surface [&_select]:rounded-md [&_select]:text-sm [&_select]:w-full
                  [&_input[type=text]]:bg-surface-container-high [&_input[type=text]]:border-outline-variant [&_input[type=text]]:text-on-surface [&_input[type=text]]:rounded-md [&_input[type=text]]:text-sm [&_input[type=text]]:w-full
                  [&_textarea]:bg-surface-container-high [&_textarea]:border-outline-variant [&_textarea]:text-on-surface [&_textarea]:rounded-md [&_textarea]:text-sm [&_textarea]:w-full
                  [&_input[type=checkbox]]:rounded [&_input[type=checkbox]]:border-outline-variant [&_input[type=checkbox]]:text-primary [&_input[type=checkbox]]:bg-surface-container-high
                  [&_label]:text-xs [&_label]:font-bold [&_label]:text-on-surface-variant [&_label]:uppercase [&_label]:tracking-wide [&_label]:mb-1 [&_label]:block
                  [&_p]:mb-4 [&_p:last-child]:mb-0">
        {{ form.as_p }}
      </div>
      <button type="submit"
              class="w-full sm:w-auto inline-flex items-center justify-center gap-2 bg-primary text-on-primary font-bold text-sm px-5 py-2.5 rounded-md hover:brightness-110 transition-all">
        <span class="material-symbols-outlined text-lg">send</span>Send
      </button>
    </form>
  </div>

</div>
{% endblock %}
