

{% extends "core/admin/admin_base.html" %}
{% block title %}Delete Article{% endblock %}
{% block content %}
<h1>Delete Article: {{ object.title }}</h1>
<p>Are you sure you want to delete this article?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Confirm Delete</button>
</form>
<a href="{% url 'core:admin_news_list' %}">Cancel</a>
{% endblock %}
