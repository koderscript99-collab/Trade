{% extends "core/base.html" %}
{% block title %}New Withdrawal{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-container-padding py-stack-lg">

    <div class="flex items-center gap-3 mb-8">
        <a href="{% url 'core:withdrawal_list' %}" class="w-10 h-10 rounded-lg edge-bg-5 flex items-center justify-center">
            <span class="material-symbols-outlined text-on-surface">arrow_back</span>
        </a>
        <h1 class="font-display-lg text-headline-md">New Withdrawal</h1>
    </div>

    <div class="glass-panel p-6 rounded-xl mb-6 flex items-center justify-between">
        <span class="text-on-surface-variant text-sm">Available Balance</span>
        <span class="font-data-lg text-xl font-bold text-primary">${{ user.balance }}</span>
    </div>

    <div class="glass-panel p-6 md:p-8 rounded-xl">
        <form method="post" class="styled-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-primary w-full mt-2">
                <span class="material-symbols-outlined text-sm">north_east</span>
                Request Withdrawal
            </button>
        </form>
    </div>

    <a href="{% url 'core:withdrawal_list' %}" class="block text-center text-on-surface-variant text-sm mt-6 hover:text-primary transition-colors">
        Back to Withdrawals
    </a>
</div>

<style>
    /* Make form inputs clearly visible against the dark glass panel */
    .styled-form label {
        display: block;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        color: var(--on-surface-variant, #9aa0a6);
        margin-bottom: 0.375rem;
    }
    .styled-form p {
        margin-bottom: 1rem;
    }
    .styled-form input[type="text"],
    .styled-form input[type="number"],
    .styled-form input[type="email"],
    .styled-form input[type="password"],
    .styled-form select,
    .styled-form textarea {
        width: 100%;
        background-color: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.18);
        color: var(--on-surface, #fff);
        border-radius: 0.75rem;
        padding: 0.75rem 1rem;
        font-size: 0.9rem;
        outline: none;
        transition: border-color 0.15s ease, background-color 0.15s ease;
    }
    .styled-form input:focus,
    .styled-form select:focus,
    .styled-form textarea:focus {
        border-color: var(--primary, #4edea3);
        background-color: rgba(255, 255, 255, 0.09);
    }

    /* Wallet / destination address field — shrink it, it doesn't need to be huge */
    .styled-form textarea[id*="address"],
    .styled-form input[id*="address"] {
        min-height: unset;
        height: 2.75rem;
        padding: 0.5rem 0.875rem;
        font-size: 0.8rem;
        resize: none;
    }
</style>
{% endblock %}
