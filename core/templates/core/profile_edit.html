
{% extends "core/base.html" %}
{% block title %}Edit Profile{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-container-padding py-stack-lg">

    <div class="flex items-center gap-3 mb-8">
        <a href="{% url 'core:profile' %}" class="w-10 h-10 rounded-lg edge-bg-5 flex items-center justify-center">
            <span class="material-symbols-outlined text-on-surface">arrow_back</span>
        </a>
        <h1 class="font-display-lg text-headline-md">Edit Profile</h1>
    </div>

    <div class="glass-panel p-6 md:p-8 rounded-xl">
        <form method="post" class="styled-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-primary w-full mt-2">
                <span class="material-symbols-outlined text-sm">save</span>
                Save Changes
            </button>
        </form>
    </div>

    <a href="{% url 'core:profile' %}" class="block text-center text-on-surface-variant text-sm mt-6 hover:text-primary transition-colors">
        Back to Profile
    </a>
</div>
{% endblock %}
